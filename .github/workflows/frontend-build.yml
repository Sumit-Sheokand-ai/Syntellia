name: Frontend Build
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build-client:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tools_website.client
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: tools_website.client/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
