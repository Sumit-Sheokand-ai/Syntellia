services:
  - type: web
    name: syntellia-backend
    env: docker
    dockerfilePath: ./Dockerfile.backend
    autoDeploy: true
    healthCheckPath: /health
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: SUPABASE_URL
        sync: false
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
