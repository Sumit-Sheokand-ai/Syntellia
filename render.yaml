services:
  - type: web
    name: syntellia-api
    runtime: node
    plan: starter
    region: oregon
    branch: main
    rootDir: .
    buildCommand: npm ci
    startCommand: npm run backend:start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: ALLOWED_ORIGIN
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
  - type: worker
    name: syntellia-worker
    runtime: node
    plan: starter
    region: oregon
    branch: main
    rootDir: .
    buildCommand: npm ci
    startCommand: npm run worker:start
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
